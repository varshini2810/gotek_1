<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Deployment Queue – GOTEK</title>
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    /* Scope specific overrides for cart page SaaS theme */
    .cart-page { padding: 120px 0 80px; min-height: 100vh; position: relative; z-index: 2; }
    .cart-page h1 { font-size: 32px; font-weight: 800; color: var(--text-main); margin-bottom: 30px; letter-spacing: -1px; }
    .cart-layout { display: grid; grid-template-columns: 1fr 340px; gap: 40px; }
    
    /* Cart Table / Grid */
    .cart-table-wrapper {
      background: #ffffff; 
      border: 1px solid var(--border-light); 
      border-radius: 12px; 
      overflow: hidden; 
      box-shadow: var(--shadow-sm);
    }

    .cart-table { width: 100%; border-collapse: separate; border-spacing: 0; }
    .cart-table th { 
      text-align: left; 
      padding: 20px; 
      background: var(--bg-surface-alt); 
      border-bottom: 1px solid var(--border-light); 
      font-size: 13px; 
      font-weight: 700; 
      text-transform: uppercase; 
      color: var(--text-muted); 
      letter-spacing: 0.5px; 
    }
    .cart-table td { 
      padding: 20px; 
      border-bottom: 1px solid var(--border-light); 
      vertical-align: middle; 
      color: var(--text-main);
    }
    .cart-table tr:last-child td { border-bottom: none; }
    
    .cart-item-img { width: 80px; height: 80px; object-fit: cover; border-radius: 8px; border: 1px solid var(--border-light); background: var(--bg-surface-alt); }
    .cart-item-name { font-weight: 700; color: var(--text-main); font-size: 15px; margin-bottom: 4px; }
    .cart-item-price { color: var(--primary-blue); font-weight: 700; font-size: 15px; }
    
    /* Qty */
    .qty-control { display: flex; align-items: center; background: #ffffff; border: 1px solid var(--border-light); border-radius: 8px; overflow: hidden; width: fit-content; box-shadow: var(--shadow-sm); }
    .qty-btn { width: 32px; height: 32px; background: transparent; border: none; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; color: var(--text-muted); transition: all 0.2s; }
    .qty-btn:hover { background: var(--bg-surface-alt); color: var(--text-main); }
    .qty-val { width: 44px; text-align: center; border: none; border-left: 1px solid var(--border-light); border-right: 1px solid var(--border-light); font-size: 14px; font-weight: 700; color: var(--text-main); background: transparent; }
    
    .remove-btn { background: rgba(239, 68, 68, 0.05); border: 1px solid rgba(239, 68, 68, 0.2); color: var(--accent-red); cursor: pointer; font-size: 16px; width: 36px; height: 36px; border-radius: 8px; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
    .remove-btn:hover { background: var(--accent-red); color: #fff; transform: translateY(-1px); box-shadow: 0 4px 10px rgba(239,68,68,0.2); }
    
    /* Summary */
    .cart-summary { 
      background: #ffffff; 
      border: 1px solid var(--border-light); 
      border-radius: 12px; 
      padding: 32px; 
      height: fit-content; 
      position: sticky; 
      top: 100px; 
      box-shadow: var(--shadow-sm); 
    }
    .cart-summary h2 { font-size: 20px; font-weight: 700; color: var(--text-main); margin-bottom: 24px; padding-bottom: 16px; border-bottom: 1px solid var(--border-light); }
    .summary-row { display: flex; justify-content: space-between; margin-bottom: 16px; font-size: 14px; color: var(--text-muted); }
    .summary-row.total { font-weight: 800; font-size: 22px; color: var(--text-main); border-top: 1px solid var(--border-light); padding-top: 24px; margin-top: 24px; }
    
    .empty-cart { text-align: center; padding: 100px 20px; background: #ffffff; border: 1px dashed var(--border-focus); border-radius: 12px; }
    .empty-cart i { font-size: 64px; color: var(--text-light); margin-bottom: 24px; display: block; }
    
    @media (max-width: 900px) { .cart-layout { grid-template-columns: 1fr; } .cart-summary { position: static; } }
  </style>
</head>
<body class="light-saas-theme">

<!-- Ambient Light Backgrounds -->
<div style="position:fixed; top:-200px; left:-200px; width:700px; height:700px; background:rgba(59,130,246,0.03); filter:blur(150px); border-radius:50%; z-index:0;"></div>
<div style="position:fixed; bottom:-200px; right:-200px; width:600px; height:600px; background:rgba(59,130,246,0.02); filter:blur(150px); border-radius:50%; z-index:0;"></div>

<!-- Minimal Glass Navigation -->
<nav class="saas-nav bg-white border-bottom shadow-sm" id="mainNav" style="padding: 12px 0;">
  <div class="nav-container">
    <a href="/" class="nav-logo" aria-label="GOTEK Home">
      <img src="/images/gotek_logo.png" alt="GOTEK Logo" />
    </a>
    <ul class="nav-links">
      <li><a href="/">Home</a></li>
      <li><a href="/products">Categories</a></li>
      <li><a href="/contact">Contact</a></li>
    </ul>
    <div class="nav-actions">
      <a href="/login" class="nav-link-subtle" id="authLink">Sign In</a>
      <a href="/cart" class="nav-cart" style="color: var(--primary-blue);">
        <i class="fas fa-shopping-cart"></i>
        <span class="cart-pulse" id="headerCartCount" style="box-shadow: 0 0 0 2px #fff;">0</span>
      </a>
      <a href="/products" class="btn-primary-saas btn-sm">Get Started</a>
      <button class="mobile-menu-btn" id="mobileToggle" aria-label="Menu">
        <i class="fas fa-bars"></i>
      </button>
    </div>
  </div>
</nav>

<!-- Mobile Menu Dropdown -->
<div class="mobile-menu" id="mobileMenu">
  <ul>
    <li><a href="/">Home</a></li>
    <li><a href="/products">Categories</a></li>
    <li><a href="/contact">Contact</a></li>
    <li style="margin-top:20px;"><a href="/login" class="btn-secondary-saas" style="width:100%; text-align:center;">Sign In</a></li>
  </ul>
</div>

<section class="cart-page">
  <div class="container" style="position: relative; z-index: 5;">
    
    <!-- Breadcrumb -->
    <div style="margin-bottom: 24px;">
      <span style="color:var(--text-muted);font-size:13px;font-weight:500;">
        <a href="/" style="color:var(--primary-blue);text-decoration:none;">Dashboard</a> <i class="fas fa-chevron-right" style="font-size:10px;margin:0 8px;color:var(--text-light)"></i> <span style="color:var(--text-main);">Deployment Queue</span>
      </span>
    </div>

    <h1><i class="fas fa-database text-blue" style="margin-right:12px;"></i> Deployment Queue</h1>
    
    <div id="cartContent">
      <div style="text-align:center;padding:60px;color:var(--primary-blue);"><i class="fas fa-circle-notch fa-spin fa-3x"></i></div>
    </div>
  </div>
</section>

<!-- Minimal Footer -->
<footer class="saas-footer bg-white border-top mt-40 pt-20 pb-20 text-center" style="position:relative; z-index:10;">
  <div class="container flex-between">
    <p class="text-muted text-xs">&copy; <script>document.write(new Date().getFullYear())</script> ID Card Platform. All rights reserved.</p>
    <div class="badges text-muted">
      <i class="fab fa-cc-visa mx-2"></i>
      <i class="fab fa-cc-mastercard mx-2"></i>
      <i class="fab fa-cc-amex mx-2"></i>
    </div>
  </div>
</footer>

<script src="/js/main.js"></script>
<script>
async function loadCart() {
  const res = await fetch('/api/cart');
  const data = await res.json();
  const el = document.getElementById('cartContent');
  
  const countEl = document.getElementById('headerCartCount');
  if(countEl) countEl.textContent = data.count || 0;

  if (!data.items || data.items.length === 0) {
    el.innerHTML = `<div class="empty-cart">
      <i class="fas fa-satellite-dish"></i>
      <h2 class="text-dark font-bold text-2xl mb-12">Queue is Empty</h2>
      <p class="text-muted mb-24">No items have been added to your cart.</p>
      <a href="/products" class="btn-primary-saas">View Catalog</a>
    </div>`;
    return;
  }

  let rows = data.items.map(item => `
    <tr>
      <td><img src="${item.product_image || '/images/category_plain.png'}" class="cart-item-img" alt="${item.product_name}" /></td>
      <td>
        <div class="cart-item-name">${item.product_name}</div>
        ${item.customisation ? `<small style="color:var(--text-muted);display:block;margin-top:4px;">${item.customisation}</small>` : ''}
      </td>
      <td class="cart-item-price">£${parseFloat(item.price).toFixed(2)}</td>
      <td>
        <div class="qty-control">
          <button class="qty-btn" onclick="updateQty(${item.id}, ${item.quantity - 1})">−</button>
          <input class="qty-val" type="number" value="${item.quantity}" min="1" onchange="updateQty(${item.id}, this.value)"/>
          <button class="qty-btn" onclick="updateQty(${item.id}, ${item.quantity + 1})">+</button>
        </div>
      </td>
      <td class="cart-item-price">£${(item.price * item.quantity).toFixed(2)}</td>
      <td><button class="remove-btn" onclick="removeItem(${item.id})" title="Remove"><i class="fas fa-trash"></i></button></td>
    </tr>`).join('');

  el.innerHTML = `
    <div class="cart-layout">
      <div>
        <div class="cart-table-wrapper">
          <table class="cart-table">
            <thead><tr><th>Product</th><th>Description</th><th>Unit Price</th><th>Quantity</th><th>Subtotal</th><th></th></tr></thead>
            <tbody>${rows}</tbody>
          </table>
        </div>
        <div style="margin-top:24px;display:flex;gap:16px;">
          <a href="/products" class="btn-secondary-saas"><i class="fas fa-arrow-left mr-8"></i> Continue Shopping</a>
          <button onclick="clearCart()" class="btn-secondary-saas" style="color:var(--accent-red);border-color:rgba(239,68,68,0.2);"><i class="fas fa-trash-alt mr-8"></i> Clear Cart</button>
        </div>
      </div>
      <div>
        <div class="cart-summary">
          <h2>Order Summary</h2>
          <div class="summary-row"><span>Items Subtotal</span><span>£${data.total.toFixed(2)}</span></div>
          <div class="summary-row"><span>Standard Delivery</span><span class="text-green font-semibold">FREE</span></div>
          <div class="summary-row"><span>Secure Checkout</span><span class="text-green font-semibold">ACTIVE</span></div>
          <div class="summary-row total"><span>Total Amount</span><span>£${data.total.toFixed(2)}</span></div>
          <a href="/checkout" class="btn-primary-saas" style="display:flex;justify-content:center;width:100%;margin-top:24px;"><i class="fas fa-lock" style="margin-right:8px;"></i> Checkout Now</a>
          <p style="text-align:center;font-size:12px;color:var(--text-muted);margin-top:16px;"><i class="fas fa-shield-alt"></i> AES-256 Encrypted Session</p>
        </div>
      </div>
    </div>`;
}

async function updateQty(id, qty) {
  if(qty < 1) return removeItem(id);
  await fetch(`/api/cart/${id}`, { method: 'PUT', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ quantity: parseInt(qty) }) });
  loadCart();
}
async function removeItem(id) {
  await fetch(`/api/cart/${id}`, { method: 'DELETE' });
  loadCart();
}
async function clearCart() {
  if (confirm('Purge all staged modules from the deployment queue?')) { 
    await fetch('/api/cart', { method: 'DELETE' }); 
    loadCart(); 
  }
}

// Auth Header state
async function initHeader() {
  try {
    const me = await fetch('/api/auth/me').then(r => r.json());
    const authLink = document.getElementById('authLink');
    if (me.user && authLink) {
      authLink.innerHTML = '<i class="fas fa-user-circle"></i> ' + me.user.name.split(' ')[0];
      authLink.href = me.user.isAdmin ? '/admin' : '/orders';
      authLink.classList.add('btn-secondary-saas', 'btn-sm');
      authLink.classList.remove('nav-link-subtle');
    }
  } catch(e) {}
}

// Mobile menu toggle
document.getElementById('mobileToggle').addEventListener('click', function() {
  const menu = document.getElementById('mobileMenu');
  const icon = this.querySelector('i');
  if(menu.style.display === 'block') {
    menu.style.display = 'none';
    icon.classList.remove('fa-times');
    icon.classList.add('fa-bars');
  } else {
    menu.style.display = 'block';
    icon.classList.remove('fa-bars');
    icon.classList.add('fa-times');
  }
});

initHeader();
loadCart();
</script>
</body>
</html>
