<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Secure Checkout – ID Card Platform</title>
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    /* Scope specific overrides for checkout page SaaS theme */
    .checkout-page { padding: 120px 0 80px; min-height: 100vh; position: relative; z-index: 2; }
    .checkout-page h1 { font-size: 32px; font-weight: 800; color: var(--text-main); margin-bottom: 30px; letter-spacing: -1px; }
    .checkout-layout { display: grid; grid-template-columns: 1fr 380px; gap: 40px; }
    
    .form-card { 
      background: #ffffff; 
      border: 1px solid var(--border-light); 
      border-radius: 12px; 
      padding: 32px; 
      margin-bottom: 24px; 
      box-shadow: var(--shadow-sm); 
    }
    .form-card h2 { font-size: 18px; font-weight: 700; color: var(--text-main); margin-bottom: 24px; padding-bottom: 12px; border-bottom: 1px solid var(--border-light); display: flex; align-items: center; gap: 10px; }
    
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; font-size: 12px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
    .form-group input, .form-group select, .form-group textarea { 
      width: 100%; padding: 14px; border: 1px solid var(--border-light); border-radius: 8px; font-size: 14px; font-family: 'Inter', sans-serif; 
      color: var(--text-main); outline: none; transition: border-color 0.2s, box-shadow 0.2s; background: #ffffff; box-shadow: var(--shadow-sm);
    }
    .form-group input:focus, .form-group textarea:focus { border-color: var(--primary-blue); box-shadow: 0 0 0 3px rgba(59,130,246,0.1); }
    .form-group textarea { resize: vertical; min-height: 100px; }
    .required { color: var(--accent-red); }
    
    .order-summary-card { 
      background: #ffffff; 
      border: 1px solid var(--border-light); 
      border-radius: 12px; 
      padding: 32px; position: sticky; top: 100px; 
      box-shadow: var(--shadow-sm); 
    }
    .order-summary-card h2 { font-size: 18px; font-weight: 700; color: var(--text-main); margin-bottom: 24px; padding-bottom: 12px; border-bottom: 1px solid var(--border-light); display: flex; align-items: center; gap: 10px; }
    
    .summary-item { display: flex; gap: 16px; margin-bottom: 16px; padding-bottom: 16px; border-bottom: 1px solid var(--border-light); }
    .summary-item img { width: 60px; height: 60px; object-fit: cover; border-radius: 8px; border: 1px solid var(--border-light); background: var(--bg-surface-alt); }
    .summary-item-info { flex: 1; }
    .summary-item-name { font-size: 14px; font-weight: 700; color: var(--text-main); margin-bottom: 4px; }
    .summary-item-price { font-size: 14px; color: var(--primary-blue); font-weight: 700; }
    
    .summary-row { display: flex; justify-content: space-between; font-size: 14px; margin-bottom: 12px; color: var(--text-muted); }
    .summary-total { font-weight: 800; font-size: 20px; color: var(--text-main); border-top: 1px solid var(--border-light); padding-top: 20px; margin-top: 16px; }
    
    .trust-row { display: flex; align-items: center; gap: 10px; font-size: 13px; color: var(--text-muted); margin-top: 16px; font-weight: 500;}
    .trust-row i { color: var(--accent-green); font-size: 16px; }
    
    .success-banner { text-align: center; padding: 80px 20px; background: #ffffff; border-radius: 16px; border: 1px solid rgba(16, 185, 129, 0.2); box-shadow: var(--shadow-sm); }
    .success-banner i { font-size: 80px; color: var(--accent-green); margin-bottom: 24px; display: block; }
    .success-banner h2 { font-size: 32px; font-weight: 800; color: var(--text-main); margin-bottom: 16px; letter-spacing: -0.5px; }
    
    .error-msg { background: rgba(239, 68, 68, 0.05); color: var(--accent-red); border: 1px solid rgba(239, 68, 68, 0.2); border-radius: 8px; padding: 14px 20px; font-size: 14px; font-weight: 500; margin-bottom: 20px; display: none; }
    
    @media (max-width: 900px) { .checkout-layout { grid-template-columns: 1fr; } .form-row { grid-template-columns: 1fr; } }
  </style>
</head>
<body class="light-saas-theme">

<!-- Ambient Light Backgrounds -->
<div style="position:fixed; top:-200px; left:-200px; width:700px; height:700px; background:rgba(59,130,246,0.03); filter:blur(150px); border-radius:50%; z-index:0;"></div>
<div style="position:fixed; bottom:-200px; right:-200px; width:600px; height:600px; background:rgba(59,130,246,0.02); filter:blur(150px); border-radius:50%; z-index:0;"></div>

<!-- Minimal Glass Navigation -->
<nav class="saas-nav bg-white border-bottom shadow-sm" id="mainNav" style="padding: 12px 0;">
  <div class="nav-container">
    <a href="/" class="nav-logo" aria-label="ID Card Platform Home">
      <img src="/images/gotek_logo.png" alt="ID Card Platform Logo" />
    </a>
    <ul class="nav-links">
      <li><a href="/">Home</a></li>
      <li><a href="/products">Categories</a></li>
      <li><a href="/contact">Contact</a></li>
    </ul>
    <div class="nav-actions">
      <a href="/login" class="nav-link-subtle" id="authLink">Sign In</a>
      <a href="/cart" class="nav-cart" id="cartHeaderLink">
        <i class="fas fa-shopping-cart"></i>
        <span class="cart-pulse" id="headerCartCount" style="box-shadow: 0 0 0 2px #fff;">0</span>
      </a>
      <a href="/products" class="btn-primary-saas btn-sm">Get Started</a>
      <button class="mobile-menu-btn" id="mobileToggle" aria-label="Menu">
        <i class="fas fa-bars"></i>
      </button>
    </div>
  </div>
</nav>

<!-- Mobile Menu Dropdown -->
<div class="mobile-menu" id="mobileMenu">
  <ul>
    <li><a href="/">Home</a></li>
    <li><a href="/products">Categories</a></li>
    <li><a href="/contact">Contact</a></li>
    <li style="margin-top:20px;"><a href="/login" class="btn-secondary-saas" style="width:100%; text-align:center;">Sign In</a></li>
  </ul>
</div>

<section class="checkout-page">
  <div class="container" style="position: relative; z-index: 5;">
    
    <!-- Breadcrumb -->
    <div style="margin-bottom: 24px;">
      <span style="color:var(--text-muted);font-size:13px;font-weight:500;">
        <a href="/" style="color:var(--primary-blue);text-decoration:none;">Dashboard</a> <i class="fas fa-chevron-right" style="font-size:10px;margin:0 8px;color:var(--text-light)"></i> <a href="/cart" style="color:var(--primary-blue);text-decoration:none;">Basket</a> <i class="fas fa-chevron-right" style="font-size:10px;margin:0 8px;color:var(--text-light)"></i> <span style="color:var(--text-main);">Checkout</span>
      </span>
    </div>

    <h1><i class="fas fa-lock text-green" style="margin-right:12px;"></i> Secure Checkout</h1>
    <div id="checkoutContent"></div>
  </div>
</section>

<!-- Minimal Footer -->
<footer class="saas-footer bg-white border-top mt-40 pt-20 pb-20 text-center" style="position:relative; z-index:10;">
  <div class="container flex-between">
    <p class="text-muted text-xs">&copy; <script>document.write(new Date().getFullYear())</script> ID Card Platform. All rights reserved.</p>
    <div class="badges text-muted">
      <i class="fab fa-cc-visa mx-2"></i>
      <i class="fab fa-cc-mastercard mx-2"></i>
      <i class="fab fa-cc-amex mx-2"></i>
    </div>
  </div>
</footer>

<script>
async function initCheckout() {
  const res = await fetch('/api/cart');
  const data = await res.json();
  
  const countEl = document.getElementById('headerCartCount');
  if(countEl) countEl.textContent = data.count || 0;

  if (!data.items || data.items.length === 0) {
    document.getElementById('checkoutContent').innerHTML = `
      <div style="text-align:center;padding:80px 20px;background:#ffffff;border-radius:12px;border:1px dashed var(--border-focus);box-shadow:var(--shadow-sm);">
        <i class="fas fa-shopping-basket text-light" style="font-size:60px;display:block;margin-bottom:20px;"></i>
        <h2 class="text-dark font-bold text-2xl mb-12">No Items in Basket</h2>
        <a href="/products" class="btn-primary-saas" style="margin-top:20px;">View Catalog</a>
      </div>`;
    return;
  }

  const summaryItems = data.items.map(i => `
    <div class="summary-item">
      <img src="${i.product_image || '/images/category_plain.png'}" alt="${i.product_name}" />
      <div class="summary-item-info">
        <div class="summary-item-name">${i.product_name}</div>
        ${i.customisation ? `<div style="font-size:11px;color:var(--text-muted);margin-top:2px;line-height:1.4;">${i.customisation}</div>` : ''}
        <div style="font-size:12px;color:var(--text-muted);margin-top:6px;font-weight:600;">Items: ${i.quantity}</div>
        <div class="summary-item-price" style="margin-top:4px;">£${(i.price * i.quantity).toFixed(2)}</div>
      </div>
    </div>`).join('');

  document.getElementById('checkoutContent').innerHTML = `
    <div class="checkout-layout">
      <div>
        <div class="error-msg" id="errorMsg"></div>
        <form id="checkoutForm">
          <div class="form-card">
            <h2><i class="fas fa-shipping-fast text-blue"></i> Shipping Address</h2>
            <div class="form-row">
              <div class="form-group"><label>First Name <span class="required">*</span></label><input type="text" name="first_name" required /></div>
              <div class="form-group"><label>Last Name <span class="required">*</span></label><input type="text" name="last_name" required /></div>
            </div>
            <div class="form-row">
              <div class="form-group"><label>Email Address <span class="required">*</span></label><input type="email" name="email" required /></div>
              <div class="form-group"><label>Phone Number</label><input type="tel" name="phone" /></div>
            </div>
            <div class="form-group"><label>Address Line 1 <span class="required">*</span></label><input type="text" name="address_line1" required /></div>
            <div class="form-group"><label>Address Line 2</label><input type="text" name="address_line2" /></div>
            <div class="form-row">
              <div class="form-group"><label>City <span class="required">*</span></label><input type="text" name="city" required /></div>
              <div class="form-group"><label>Postcode <span class="required">*</span></label><input type="text" name="postcode" required /></div>
            </div>
            <div class="form-group"><label>Order Notes</label><textarea name="notes" placeholder="Any special instructions for your order..."></textarea></div>
          </div>
          <div class="form-card">
            <h2><i class="fas fa-wallet" style="color:#a78bfa;"></i> Billing Authorization</h2>
            <p style="font-size:13px;color:var(--text-muted);margin-bottom:20px;">Transactions are AES-256 encrypted end-to-end. We accept all major credit architectures.</p>
            <div class="form-row">
              <div class="form-group"><label>Card Ident</label><input type="text" placeholder="XXXX XXXX XXXX XXXX" maxlength="19" /></div>
              <div class="form-group"><label>Auth Name</label><input type="text" placeholder="JOHN DOE" /></div>
            </div>
            <div class="form-row">
              <div class="form-group"><label>Expiry (MM/YY)</label><input type="text" placeholder="MM/YY" maxlength="5" /></div>
              <div class="form-group"><label>CVC</label><input type="text" placeholder="XXX" maxlength="4" /></div>
            </div>
            <div style="display:flex;gap:12px;margin-top:10px;flex-wrap:wrap;">
              <span style="padding:6px 12px;border:1px solid var(--border-light);border-radius:4px;font-size:11px;font-weight:800;color:var(--text-muted);background:var(--bg-surface-alt);">VISA</span>
              <span style="padding:6px 12px;border:1px solid var(--border-light);border-radius:4px;font-size:11px;font-weight:800;color:var(--text-muted);background:var(--bg-surface-alt);">MC</span>
              <span style="padding:6px 12px;border:1px solid var(--border-light);border-radius:4px;font-size:11px;font-weight:800;color:var(--text-muted);background:var(--bg-surface-alt);">AMEX</span>
            </div>
          </div>
          <button type="submit" class="btn-primary-saas" style="width:100%;padding:16px;font-size:16px;justify-content:center;">
            <i class="fas fa-shopping-bag mr-8"></i> PLACE ORDER – £${data.total.toFixed(2)}
          </button>
        </form>
      </div>
      <div>
        <div class="order-summary-card">
          <h2><i class="fas fa-file-invoice-dollar text-blue"></i> Order Summary</h2>
          ${summaryItems}
          <div class="summary-row" style="margin-top:20px;"><span>Subtotal</span><span>£${data.total.toFixed(2)}</span></div>
          <div class="summary-row"><span>Delivery</span><span class="text-green font-semibold">FREE</span></div>
          <div class="summary-row summary-total"><span>Total Amount</span><span class="text-blue">£${data.total.toFixed(2)}</span></div>
          <div class="trust-row"><i class="fas fa-shield-alt"></i> Secure Payment Processing</div>
          <div class="trust-row"><i class="fas fa-shipping-fast"></i> Reliable Shipping</div>
          <div class="trust-row"><i class="fas fa-check-circle"></i> Quality Guarantee</div>
        </div>
      </div>
    </div>`;

  document.getElementById('checkoutForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const errorEl = document.getElementById('errorMsg');
    errorEl.style.display = 'none';
    const btn = this.querySelector('button[type=submit]');
    btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-8"></i> AUTHENTICATING...'; 
    btn.disabled = true;
    
    const fd = new FormData(this);
    const body = {};
    fd.forEach((v, k) => body[k] = v);
    
    try {
      const res = await fetch('/api/orders', {
        method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(body)
      });
      const data = await res.json();
      if (res.ok) {
        document.getElementById('checkoutContent').innerHTML = `
          <div class="success-banner">
            <i class="fas fa-check-circle text-green"></i>
            <h2 class="text-dark">Order Confirmed</h2>
            <p style="font-size:16px;color:var(--text-muted);margin:15px 0 8px;">Your order reference:</p>
            <p style="font-size:28px;font-weight:800;color:var(--primary-blue);margin-bottom:20px;letter-spacing:1px;">${data.order.order_ref}</p>
            <p style="color:var(--text-muted);max-width:600px;line-height:1.6;margin:0 auto 30px;">Thank you for your order! We are preparing your products for shipment. You will receive an email confirmation shortly with your order details.</p>
            <a href="/" class="btn-secondary-saas" style="padding:12px 30px;"><i class="fas fa-home mr-8"></i> Return to Homepage</a>
          </div>`;
      } else {
        errorEl.textContent = data.error; errorEl.style.display = 'block';
        btn.innerHTML = `<i class="fas fa-shopping-bag mr-8"></i> PLACE ORDER – £${data.total}`; btn.disabled = false;
        window.scrollTo({top:0, behavior:'smooth'});
      }
    } catch(err) {
      errorEl.textContent = 'Network partition detected. Please retry.'; errorEl.style.display = 'block';
      btn.innerHTML = `<i class="fas fa-shopping-bag mr-8"></i> PLACE ORDER – £${data.total}`; btn.disabled = false;
      window.scrollTo({top:0, behavior:'smooth'});
    }
  });
}

// Auth Header state
async function initHeader() {
  try {
    const me = await fetch('/api/auth/me').then(r => r.json());
    const authLink = document.getElementById('authLink');
    if (me.user && authLink) {
      authLink.innerHTML = '<i class="fas fa-user-circle"></i> ' + me.user.name.split(' ')[0];
      authLink.href = me.user.isAdmin ? '/admin' : '/orders';
      authLink.classList.add('btn-secondary-saas', 'btn-sm');
      authLink.classList.remove('nav-link-subtle');
    }
  } catch(e) {}
}

// Mobile menu toggle
document.getElementById('mobileToggle').addEventListener('click', function() {
  const menu = document.getElementById('mobileMenu');
  const icon = this.querySelector('i');
  if(menu.style.display === 'block') {
    menu.style.display = 'none';
    icon.classList.remove('fa-times');
    icon.classList.add('fa-bars');
  } else {
    menu.style.display = 'block';
    icon.classList.remove('fa-bars');
    icon.classList.add('fa-times');
  }
});

initHeader();
initCheckout();
</script>
</body>
</html>
